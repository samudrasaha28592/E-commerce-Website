<!DOCTYPE html>
<html>

<head>
    <title>Document</title>

    <style>
        .grid-container {
            display: grid;
            grid-template-columns: auto auto auto auto auto;
        }

        .grid-container>div {
            background-color: brown;
            border: 1px solid greenyellow;
            text-align: center;
            font-size: 1.5rem;
        }

        .item1 {

            grid-column: 1/7;
        }

        .item2 {

            grid-column: 1/2;
        }

        .item3 {

            grid-column: 2/6;
        }

        .item4 {

            grid-column: 6/7;
        }

        .item5 {

            grid-column: 1/7;
        }

        
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="item1">
            <h1>Header</h1>
        </div>
        <div class="item2">
            <h1>Menu</h1>
        </div>
        <div>
            <h1 class="item3">Main</h1>
        </div>
        <div>
            <h1 class="item4">Aside</h1>
        </div>
        <div>
            <h1 class="item5">Footer</h1>
        </div>
    </div>




</body>

</html>
