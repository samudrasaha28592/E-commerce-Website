<!DOCTYPE html>
<html>

<head>
    <title>CSS Learning</title>
    <style>
        #nav-menu {
            width: 500px;
            height: 80px;
            background-color: rgb(4, 83, 129);
            margin: 4px auto;

        }

        #nav-menu ul li {
            list-style: none;
            float: left;
            margin: 20px;
        }

        #nav-menu ul li a {
            text-decoration: none;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 20px;

        }

        #nav-menu ul li a:hover {
            color: rgb(5, 181, 245);
        }
    </style>

</head>

<body>

    <div id="nav-menu">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Tutorial</a></li>
        </ul>
    </div>

</body>

</html>
