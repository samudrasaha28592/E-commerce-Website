<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;

        }

        .navbar {
            background: gold;
            padding: 15px 0;
            text-align: center;

        }

        .navbar a {
            color: black;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 20px;
            transition: 0.3s;

        }

        .navbar a:hover {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
        }

        .dropdown-container {

            display: inline-block;
            position: relative;

        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            left: 0;
            background: skyblue;
            min-width: 140px;
            border-radius: 15px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(25px);
            visibility: hidden;

        }

        .dropdown-container:hover .dropdown-content {
            opacity: 1;
            transform: translateY(25px);
            visibility: visible;
        }

        .dropdown-content a {
            display: block;
            padding: 15px;
            color: black;
            border-radius: 14px;
            text-decoration: none;
            transition: 0.3s;

        }

        .dropdown-content a:hover {
            padding-left: 25px;
            background: greenyellow;


        }

        .dropdown-home {
            display: inline-block;
            position: relative;
        }

        .dropcontent-home {
            position: absolute;
            top: 100%;
            left: -10px;
            background: skyblue;
            border-radius: 15px;
            opacity: 0;
            transform: translateY(14px);
            visibility: hidden;
            transition: 0.3s;

        }

        .dropdown-home:hover .dropcontent-home {
            opacity: 1;
            transform: translateY(13px);
            visibility: visible;


        }

        .dropdown-home a {
            display: block;
            padding: 10px;
            transition: 0.3s;
        }

        .dropdown-home a:hover {
            padding-left: 15px;
        }

        .dropdown-container a:hover {
            padding-left: 25px;
        }
    </style>

</head>

<body>
    <div class="navbar">
        <div class="dropdown-home">
            <a href="#">Home</a>
            <div class="dropcontent-home">
                <a href="#">Address</a>
                <a href="#">Location</a>
            </div>
        </div>

        <a href="#">Tutorial</a>
        <div class="dropdown-container">
            <a href="#">Contact Me</a>
            <div class="dropdown-content">
                <a href="#">Email</a>
                <a href="#">Facebook</a>
                <a href="#">Youtube</a>
            </div>
        </div>

    </div>
</body>

</html>
