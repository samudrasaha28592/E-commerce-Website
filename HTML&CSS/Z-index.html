<!DOCTYPE html>
<html>

<head>
    <title>
        <h2>z-index</h2>
    </title>
    <style>
        :root {
            --primary-color: red;
            --secondary-color: green;
        }

        div {
            height: 250px;
            width: 250px;
        }

        #div1 {
            background: black;
            position: absolute;
            z-index: 1;
        }

        #div2 {
            background: rgb(0, 94, 255);
            background: var(--primary-color, yellow);
            position: absolute;
            left: 150px;
            top: 150px;
            z-index: 1;
        }

        @media screen and(max-width:200px) {


            :root {
                --primary-color: rgb(255, 102, 0);
            }
        }
    </style>

</head>

<body>
    <div id="div1"></div>
    <div id="div2"></div>

</body>

</html>
