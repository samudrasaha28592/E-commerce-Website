<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Button</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .social-media {
            background-color: gray;
            padding: 50px 20px;
            text-align: center;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            font-size: 2rem;
            border-radius: 10px;
        }
    </style>


</head>

<body>
    <div class="social-media">
        <button class="btn" onclick="window.open('http://www.studywithanis.com/')" class="btn request-callback">
            <i class="fab fa-google" aria-hidden="true"></i>
        </button>
        <i class="fab fa-facebook" style="color:#3b5998" aria-hidden="true"></i>
        </button>
    </div>

</body>

</html>
