<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize List </title>

    <style>
        .course-list {
            background: red;
            padding: 20px;

        }

        .course-list ul {
            list-style: none;
            padding-left: 0;
        }

        .course-list ul li {
            position: relative;
            padding-left: 25px;
        }

        .course-list ul li::before {
            content: " ";
            position: absolute;
            left: 0;
            top: 4px;
            height: 14px;
            width: 14px;
            background: url("check-mark.png");
            background-size: contain;
        }
    </style>



</head>

<body>
    <div class="course-list">

        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
            <li>JQuery</li>



        </ul>


    </div>
</body>

</html>
