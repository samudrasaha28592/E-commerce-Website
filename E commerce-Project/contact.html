<main class="contact_page">

    <div class="contact_container">

        <!-- Left Side -->
        <div class="contact_info">
            <h2>Get In Touch 📩</h2>
            <p>Feel free to contact us for any questions or support.</p>

            <div class="info_item">
                <i class="fa-solid fa-location-dot"></i>
                <span>Dhaka, Bangladesh</span>
            </div>

            <div class="info_item">
                <i class="fa-solid fa-phone"></i>
                <span>+880 1234 567890</span>
            </div>

            <div class="info_item">
                <i class="fa-solid fa-envelope"></i>
                <span>sagor@example.com</span>
            </div>
            <div class="map_box">
                <iframe src="https://www.google.com/maps?q=Dhaka,Bangladesh&output=embed" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>

        <!-- Right Side -->
        <div class="contact_form_box">
            <h2>Send Message</h2>

            <form>
                <div class="input_group">
                    <input type="text" required>
                    <label>Your Name</label>
                </div>

                <div class="input_group">
                    <input type="email" required>
                    <label>Email Address</label>
                </div>

                <div class="input_group">
                    <textarea required></textarea>
                    <label>Your Message</label>
                </div>

                <button type="submit" class="contact_btn">Send Message</button>
            </form>
        </div>

    </div>

</main>
